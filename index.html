<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Farine Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#0a0a0a;color:white}

/* NAV */
nav{
position:fixed;
top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}
nav h2{color:#fbbf24}

/* HERO */
.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1551024506-0bccd828d307') center/cover;
display:flex;align-items:center;justify-content:center;
text-align:center;
}
.hero h1{font-size:60px}
.btn{
background:#fbbf24;color:black;
padding:12px 25px;border-radius:30px;
text-decoration:none;
}

/* MENU */
.menu{padding:100px 20px}
.section-title{text-align:center;font-size:40px}

/* SEARCH */
.search{
max-width:400px;margin:20px auto;
}
.search input{
width:100%;padding:12px;border-radius:30px;border:none;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#1a1a1a;border-radius:15px;
overflow:hidden;
transition:0.3s;
}
.card:hover{transform:scale(1.05)}
.card img{
width:100%;height:180px;object-fit:cover;
}
.card-content{padding:15px}
.price{color:#fbbf24;font-weight:bold}
.add-btn{
margin-top:10px;
background:#fbbf24;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
}
.cart h3{text-align:center}
.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}
.checkout{
margin-top:20px;
background:#25D366;
padding:10px;
text-align:center;
border-radius:20px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;right:20px;
background:#25D366;
padding:15px;border-radius:50%;
text-decoration:none;
font-size:22px;
}
</style>
</head>

<body>

<nav>
<h2>La Farine</h2>
</nav>

<section class="hero">
<div>
<h1>La Farine Cafe</h1>
<p>Premium Dessert Experience</p>
<a href="#menu" class="btn">Explore Menu</a>
</div>
</section>

<section class="menu" id="menu">

<h2 class="section-title">Menu</h2>

<div class="search">
<input type="text" placeholder="Search..." onkeyup="searchFood(this.value)">
</div>

<div class="grid" id="menuList">

<div class="card">
<img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
<div class="card-content">
<h3>Tiramisu</h3>
<p class="price">₹220</p>
<button class="add-btn" onclick="addToCart('Tiramisu',220)">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589308078054-8324a9cb1a58">
<div class="card-content">
<h3>Biscoff Cheesecake</h3>
<p class="price">₹280</p>
<button class="add-btn" onclick="addToCart('Biscoff Cheesecake',280)">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521389508051-d7ffb5dc8d6f">
<div class="card-content">
<h3>Rose Pasta</h3>
<p class="price">₹399</p>
<button class="add-btn" onclick="addToCart('Rose Pasta',399)">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5">
<div class="card-content">
<h3>Matcha Latte</h3>
<p class="price">₹299</p>
<button class="add-btn" onclick="addToCart('Matcha Latte',299)">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div class="card-content">
<h3>Chicken Burger</h3>
<p class="price">₹359</p>
<button class="add-btn" onclick="addToCart('Chicken Burger',359)">Add</button>
</div>
</div>

</div>
</section>

<!-- CART -->
<div class="cart">
<h3>Your Order</h3>
<div id="cartItems"></div>
<h4 id="total">Total: ₹0</h4>
<div class="checkout" onclick="orderWhatsApp()">Order on WhatsApp</div>
</div>

<a class="whatsapp" href="#">💬</a>

<script>
let cart=[];

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach(item=>{
total+=item.price;
container.innerHTML+=`<div class="cart-item">
<span>${item.name}</span>
<span>₹${item.price}</span>
</div>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

function orderWhatsApp(){
let text="Order:%0A";
cart.forEach(i=>{
text+=i.name+" - ₹"+i.price+"%0A";
});
window.open("https://wa.me/919876543210?text="+text);
}

function searchFood(value){
let cards=document.querySelectorAll(".card");
cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(value.toLowerCase())?"block":"none";
});
}
</script>

</body>
</html>

</body>
</html>
